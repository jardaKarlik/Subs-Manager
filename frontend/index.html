<style>
  html, body { margin: 0; padding: 0; background: #0a0a0b; min-height: 100vh; }
  *, *::before, *::after { box-sizing: border-box; }
  body { font-family: 'Space Grotesk', system-ui, sans-serif; }

  .stage {
    min-height: 100vh;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    padding: 28px 28px 40px;
    background:
      radial-gradient(1200px 700px at 20% 0%, rgba(255,230,0,0.05), transparent 60%),
      radial-gradient(1200px 700px at 100% 100%, rgba(255,107,26,0.04), transparent 60%),
      #0a0a0b;
    gap: 16px;
  }

  /* Top control bar — outside the browser frame */
  .topbar {
    display: flex; align-items: center; gap: 14px;
    width: 1440px; max-width: 100%;
    color: rgba(255,255,255,0.7);
    font-family: 'JetBrains Mono', ui-monospace, monospace;
    font-size: 11px;
  }
  .topbar .pill {
    padding: 6px 11px; border-radius: 6px;
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.08);
    cursor: pointer; color: rgba(255,255,255,0.55);
    transition: all .12s;
  }
  .topbar .pill:hover { color: #fff; }
  .topbar .pill.active {
    background: rgba(255,230,0,0.12);
    border-color: rgba(255,230,0,0.5);
    color: #ffe600;
  }
  .topbar .label {
    color: rgba(255,255,255,0.3);
    text-transform: uppercase; letter-spacing: 1.2px;
  }
  .topbar .group { display: flex; gap: 5px; }

  .browser {
    width: 1440px; max-width: 100%;
    height: 980px;
    border-radius: 14px; overflow: hidden;
    background: #0a0a0b;
    border: 1px solid rgba(255,255,255,0.08);
    box-shadow:
      0 0 0 1px rgba(255,255,255,0.04),
      0 40px 100px -20px rgba(0,0,0,0.6);
    display: flex; flex-direction: column;
  }
  .browser-chrome {
    height: 40px; flex: 0 0 auto;
    background: #161618;
    border-bottom: 1px solid rgba(255,255,255,0.06);
    display: flex; align-items: center;
    padding: 0 14px; gap: 10px;
  }
  .dots { display: flex; gap: 6px; }
  .dots span { width: 11px; height: 11px; border-radius: 50%; display: block; }
  .dots span:nth-child(1) { background: #ff5f57; }
  .dots span:nth-child(2) { background: #febc2e; }
  .dots span:nth-child(3) { background: #28c840; }
  .url {
    flex: 1; max-width: 480px; margin: 0 auto;
    height: 24px; border-radius: 6px;
    background: rgba(255,255,255,0.05);
    display: flex; align-items: center; justify-content: center;
    gap: 6px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px; color: rgba(255,255,255,0.5);
  }
  .url::before {
    content: ''; width: 8px; height: 8px;
    border-radius: 50%; background: #5fe39a;
    box-shadow: 0 0 6px rgba(95,227,154,0.5);
  }
  .browser-body { flex: 1; overflow: hidden; position: relative; }

  /* Screen transitions */
  .screen-enter { animation: fadeIn 200ms ease-out both; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: translateY(0); } }
  @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
</style>

<script type="text/babel" data-presets="react">
function DesktopPrototype() {
  const [layout, setLayout] = React.useState('command');
  const [stack, setStack] = React.useState([{ screen: 'overview' }]);
  const [tick, setTick] = React.useState(0);
  const [loading, setLoading] = React.useState(true);
  const top = stack[stack.length - 1];

  // Check if data loaded
  React.useEffect(() => {
    const checkTimer = setInterval(() => {
      if (window.SERVICES && window.SERVICES.length > 0) {
        setLoading(false);
      }
    }, 100);
    
    // Force stop loading after 10s
    const timeoutTimer = setTimeout(() => {
      console.log('⏰ 10s timeout - stopping spinner');
      setLoading(false);
    }, 10000);
    
    return () => {
      clearInterval(checkTimer);
      clearTimeout(timeoutTimer);
    };
  }, []);

  React.useEffect(() => {
    window.__nav = (action, param, extra) => {
      if (action === 'back') {
        setStack(s => s.length > 1 ? s.slice(0, -1) : s);
      } else if (action === 'category') {
        setStack(s => [...s, { screen: 'category', catId: param, svcId: extra }]);
      } else if (action === 'section') {
        // Sidebar item — treat 'overview' as root, others as a faux category-like view
        if (param === 'overview') setStack([{ screen: 'overview' }]);
        else if (param === 'categories') setStack([{ screen: 'overview' }]);
        else if (param === 'idle') {
          // Drop into a synthetic "idle" view — reuse category with all idle services
          setStack(s => [...s, { screen: 'idle' }]);
        }
      }
    };
    return () => { delete window.__nav; };
  }, []);

  // Refresh hook: app.js calls window.refreshApp() after fetching data
  React.useEffect(() => {
    window.refreshApp = () => setTick(t => t + 1);
    return () => { delete window.refreshApp; };
  }, []);

  // Wire topbar
  React.useEffect(() => {
    const toggle = document.getElementById('layout-toggle');
    const onToggle = (e) => {
      const p = e.target.closest('[data-layout]');
      if (p) setLayout(p.dataset.layout);
    };
    toggle.addEventListener('click', onToggle);

    const onAction = (e) => {
      const p = e.target.closest('[data-action]');
      if (!p) return;
      const [type, param] = p.dataset.action.split(':');
      if (type === 'overview') setStack([{ screen: 'overview' }]);
      else if (type === 'cat') setStack([{ screen: 'overview' }, { screen: 'category', catId: param }]);
    };
    document.addEventListener('click', onAction);

    const back = document.getElementById('back-pill');
    const onBack = () => window.__nav && window.__nav('back');
    back.addEventListener('click', onBack);

    return () => {
      toggle.removeEventListener('click', onToggle);
      document.removeEventListener('click', onAction);
      back.removeEventListener('click', onBack);
    };
  }, []);

  // Update topbar active state + URL
  React.useEffect(() => {
    document.querySelectorAll('[data-layout]').forEach(el => {
      el.classList.toggle('active', el.dataset.layout === layout);
    });
    const urlpath = document.getElementById('urlpath');
    if (top.screen === 'overview') urlpath.textContent = '/overview';
    else if (top.screen === 'category') urlpath.textContent = '/categories/' + top.catId;
    else if (top.screen === 'idle') urlpath.textContent = '/idle';
  }, [layout, top]);

  let body;
  if (loading) {
    body = (
      <div style={{ display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center', height: '100%', gap: '16px' }}>
        <div style={{ width: '40px', height: '40px', border: '4px solid rgba(255,230,0,0.2)', borderTop: '4px solid #ffe600', borderRadius: '50%', animation: 'spin 1s linear infinite' }}></div>
        <div style={{ color: '#8a8a8e', fontSize: '13px', fontFamily: 'JetBrains Mono, monospace' }}>Loading subscriptions...</div>
      </div>
    );
  } else if (top.screen === 'overview') {
    body = layout === 'command' ? <DesktopCommand /> : <DesktopEditorial />;
  } else if (top.screen === 'category') {
    body = <DesktopCategory catId={top.catId} selectedSvcId={top.svcId} />;
  } else if (top.screen === 'idle') {
    // Build a synthetic "category" view of idle services — reuse the category UI structure
    body = <DesktopCategory catId="ai" />;
  }

  const k = tick + ':' + stack.length + ':' + top.screen + ':' + (top.catId || '') + ':' + layout;
  return (
    <div key={k} className="screen-enter" style={{ width: '100%', height: '100%' }}>
      {body}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('screen')).render(<DesktopPrototype />);
</script>


</body></html>
