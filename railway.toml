# Railway.app deployment configuration
[build]
builder = "nixpacks"

[deploy]
numReplicas = 1
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3

[environments.production]
variables = [
  "PYTHON_VERSION=3.11",
  "PORT=8000",
]

[[services]]
name = "app"
startCommand = "python -m uvicorn api:app --host 0.0.0.0 --port $PORT"
ports = [{ port = 8000, type = "HTTP" }]
