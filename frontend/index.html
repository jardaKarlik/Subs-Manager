<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Subs Manager</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Inter', sans-serif;
            background: #0a0a0b;
            color: #fff;
            padding: 24px;
        }

        .container { max-width: 1200px; margin: 0 auto; }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 32px;
            padding-bottom: 16px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 24px;
            font-weight: 700;
        }

        .logo-icon {
            width: 40px;
            height: 40px;
            background: #ffe600;
            color: #000;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .btn {
            padding: 10px 16px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 500;
            font-size: 14px;
            transition: all 0.2s;
        }

        .btn-primary { background: #ffe600; color: #000; }
        .btn-primary:hover { opacity: 0.9; }
        .btn-secondary { background: rgba(255,255,255,0.1); color: #fff; }
        .btn-secondary:hover { background: rgba(255,255,255,0.15); }

        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 16px;
            margin-bottom: 32px;
        }

        .stat-card {
            background: #1a1a1c;
            padding: 20px;
            border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .stat-label {
            font-size: 12px;
            color: #888;
            text-transform: uppercase;
            margin-bottom: 8px;
        }

        .stat-value { font-size: 28px; font-weight: 700; }

        .subscriptions-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 16px;
        }

        .sub-card {
            background: #1a1a1c;
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 12px;
            padding: 20px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .sub-card:hover {
            border-color: #ffe600;
            transform: translateY(-2px);
        }

        .sub-icon {
            width: 48px;
            height: 48px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            margin-bottom: 12px;
        }

        .sub-name { font-size: 16px; font-weight: 600; margin-bottom: 4px; }
        .sub-category { font-size: 12px; color: #888; text-transform: uppercase; }
        .sub-cost { font-size: 24px; font-weight: 700; margin: 12px 0; }

        .sub-details {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-top: 12px;
            border-top: 1px solid rgba(255,255,255,0.1);
        }

        .sub-cycle { font-size: 12px; color: #888; }

        .status-badge {
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 11px;
            font-weight: 500;
            text-transform: uppercase;
        }

        .status-active { background: rgba(95,227,154,0.2); color: #5fe39a; }
        .status-idle { background: rgba(255,107,26,0.2); color: #ff6b1a; }
        .status-cancelled { background: rgba(138,138,142,0.2); color: #8a8a8e; }
        .loading { text-align: center; padding: 40px; color: #888; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="logo">
                <div class="logo-icon">$</div>
                <span>subs.</span>
            </div>
            <div style="display: flex; gap: 12px;">
                <button class="btn btn-secondary" onclick="syncData()">↻ Sync</button>
                <button class="btn btn-primary" onclick="alert('Add subscription modal')">+ Add</button>
            </div>
        </div>

        <div class="stats">
            <div class="stat-card">
                <div class="stat-label">Monthly Total</div>
                <div class="stat-value">$<span id="monthly-total">0</span></div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Yearly Total</div>
                <div class="stat-value">$<span id="yearly-total">0</span></div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Active</div>
                <div class="stat-value" id="active-count">0</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Total</div>
                <div class="stat-value" id="total-count">0</div>
            </div>
        </div>

        <div id="subscriptions" class="subscriptions-grid">
            <div class="loading">Loading...</div>
        </div>
    </div>
    <script src="simple.js"></script>
</body>
</html>
