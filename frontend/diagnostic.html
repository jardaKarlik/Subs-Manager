<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Subscription Manager - Diagnostic Dashboard</title>
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  background: linear-gradient(135deg, #0a0a0b 0%, #1a1a1b 100%);
  color: #e0e0e0;
  min-height: 100vh;
  padding: 20px;
}

.container { max-width: 1200px; margin: 0 auto; }

.header {
  text-align: center;
  margin-bottom: 40px;
  padding: 30px;
  background: rgba(255, 255, 255, 0.05);
  border-radius: 12px;
  border: 1px solid rgba(255, 255, 255, 0.1);
}

.header h1 {
  font-size: 32px;
  font-weight: 700;
  color: #ffe600;
  margin-bottom: 10px;
}

.header p {
  color: #8a8a8e;
  font-size: 14px;
}

.grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
  gap: 20px;
  margin-bottom: 30px;
}

.card {
  background: rgba(255, 255, 255, 0.05);
  border: 1px solid rgba(255, 255, 255, 0.1);
  border-radius: 12px;
  padding: 24px;
}

.card h2 {
  font-size: 18px;
  margin-bottom: 16px;
  color: #fff;
  display: flex;
  align-items: center;
  gap: 8px;
}

.status-badge {
  display: inline-block;
  padding: 4px 12px;
  border-radius: 20px;
  font-size: 11px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.5px;
}

.status-success { background: #1D9E75; color: #fff; }
.status-error { background: #ff4d4d; color: #fff; }
.status-warning { background: #febc2e; color: #000; }

.info-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 12px 0;
  border-bottom: 1px solid rgba(255, 255, 255, 0.05);
}

.info-row:last-child { border-bottom: none; }

.info-label {
  color: #8a8a8e;
  font-size: 13px;
}

.info-value {
  color: #e0e0e0;
  font-size: 13px;
  font-weight: 500;
  font-family: 'JetBrains Mono', monospace;
}

.code-block {
  background: #0a0a0b;
  border: 1px solid rgba(255, 255, 255, 0.1);
  border-radius: 8px;
  padding: 16px;
  margin-top: 12px;
  overflow-x: auto;
}

.code-block pre {
  font-family: 'JetBrains Mono', monospace;
  font-size: 12px;
  line-height: 1.6;
  color: #5fe39a;
}

.btn {
  background: #ffe600;
  color: #000;
  border: none;
  padding: 10px 20px;
  border-radius: 6px;
  font-weight: 600;
  cursor: pointer;
  font-size: 13px;
  transition: all 0.2s;
  width: 100%;
  margin-top: 12px;
}

.btn:hover { transform: translateY(-1px); box-shadow: 0 4px 12px rgba(255, 230, 0, 0.3); }
.btn:disabled { opacity: 0.5; cursor: not-allowed; }

.btn-secondary {
  background: rgba(255, 255, 255, 0.1);
  color: #fff;
  border: 1px solid rgba(255, 255, 255, 0.2);
}

.test-results {
  margin-top: 12px;
  padding: 12px;
  background: rgba(0, 0, 0, 0.3);
  border-radius: 6px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  max-height: 300px;
  overflow-y: auto;
}

.test-line {
  padding: 4px 0;
  display: flex;
  gap: 8px;
}

.test-icon { flex-shrink: 0; }

.fixes-section {
  margin-top: 30px;
}

.fix-card {
  background: rgba(255, 230, 0, 0.05);
  border: 1px solid rgba(255, 230, 0, 0.3);
  border-radius: 12px;
  padding: 24px;
  margin-bottom: 16px;
}

.fix-card h3 {
  color: #ffe600;
  font-size: 16px;
  margin-bottom: 12px;
  display: flex;
  align-items: center;
  gap: 8px;
}

.fix-number {
  background: #ffe600;
  color: #000;
  width: 24px;
  height: 24px;
  border-radius: 50%;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  font-size: 12px;
  font-weight: 700;
}

.fix-description {
  color: #b0b0b0;
  font-size: 14px;
  line-height: 1.6;
  margin-bottom: 12px;
}

.spinner {
  border: 3px solid rgba(255, 255, 255, 0.1);
  border-top: 3px solid #ffe600;
  border-radius: 50%;
  width: 20px;
  height: 20px;
  animation: spin 1s linear infinite;
  display: inline-block;
  margin-left: 8px;
}

@keyframes spin {
  0% { transform: rotate(0deg); }
  100% { transform: rotate(360deg); }
}
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
const { useState, useEffect } = React;

function DiagnosticDashboard() {
  const [backendStatus, setBackendStatus] = useState({ status: 'checking', message: 'Checking...', port: null });
  const [frontendStatus, setFrontendStatus] = useState({ status: 'checking', message: 'Checking...' });
  const [databaseStatus, setDatabaseStatus] = useState({ status: 'unknown', message: 'Not checked', count: 0 });
  const [testResults, setTestResults] = useState([]);
  const [testing, setTesting] = useState(false);

  // Check backend status on mount
  useEffect(() => {
    checkBackend();
  }, []);

  const checkBackend = async () => {
    const ports = [8000, 8001];
    let foundPort = null;

    for (const port of ports) {
      try {
        const response = await fetch(`http://localhost:${port}/api/health`, {
          method: 'GET',
          signal: AbortSignal.timeout(2000)
        });

        if (response.ok) {
          const data = await response.json();
          foundPort = port;
          setBackendStatus({
            status: 'success',
            message: `Backend running on port ${port}`,
            port,
            version: data.version
          });
          break;
        }
      } catch (err) {
        // Continue to next port
      }
    }

    if (!foundPort) {
      setBackendStatus({
        status: 'error',
        message: 'Backend not running on port 8000 or 8001',
        port: null
      });
    }
  };

  const runFullDiagnostic = async () => {
    setTesting(true);
    const results = [];

    results.push({ icon: '🔍', text: 'Starting diagnostic tests...', status: 'info' });
    setTestResults([...results]);

    // Test 1: Backend Health
    results.push({ icon: '⏳', text: 'Testing backend health endpoint...', status: 'running' });
    setTestResults([...results]);

    const ports = [8000, 8001];
    let backendPort = null;

    for (const port of ports) {
      try {
        const response = await fetch(`http://localhost:${port}/api/health`, {
          signal: AbortSignal.timeout(3000)
        });
        if (response.ok) {
          backendPort = port;
          results[results.length - 1] = {
            icon: '✅',
            text: `Backend is running on port ${port}`,
            status: 'success'
          };
          break;
        }
      } catch (err) {}
    }

    if (!backendPort) {
      results[results.length - 1] = {
        icon: '❌',
        text: 'Backend is NOT running on port 8000 or 8001',
        status: 'error'
      };
      setTestResults([...results]);
      setTesting(false);
      return;
    }

    setTestResults([...results]);

    // Test 2: Subscriptions endpoint
    results.push({ icon: '⏳', text: 'Testing /api/subscriptions...', status: 'running' });
    setTestResults([...results]);

    try {
      const response = await fetch(`http://localhost:${backendPort}/api/subscriptions`, {
        signal: AbortSignal.timeout(3000)
      });
      const data = await response.json();

      results[results.length - 1] = {
        icon: '✅',
        text: `Subscriptions endpoint OK - ${data.total || 0} subscriptions found`,
        status: 'success',
        data: data.total
      };

      setDatabaseStatus({
        status: data.total > 0 ? 'success' : 'warning',
        message: data.total > 0 ? `${data.total} subscriptions in database` : 'Database empty - add test data',
        count: data.total
      });
    } catch (err) {
      results[results.length - 1] = {
        icon: '❌',
        text: `Subscriptions endpoint failed: ${err.message}`,
        status: 'error'
      };
    }

    setTestResults([...results]);

    // Test 3: Stats endpoint
    results.push({ icon: '⏳', text: 'Testing /api/stats...', status: 'running' });
    setTestResults([...results]);

    try {
      const response = await fetch(`http://localhost:${backendPort}/api/stats`, {
        signal: AbortSignal.timeout(3000)
      });
      const data = await response.json();

      results[results.length - 1] = {
        icon: '✅',
        text: `Stats endpoint OK - $${data.total_monthly_cost?.toFixed(2) || 0}/mo`,
        status: 'success'
      };
    } catch (err) {
      results[results.length - 1] = {
        icon: '❌',
        text: `Stats endpoint failed: ${err.message}`,
        status: 'error'
      };
    }

    setTestResults([...results]);

    // Test 4: Frontend port check
    results.push({ icon: '⏳', text: 'Checking frontend configuration...', status: 'running' });
    setTestResults([...results]);

    const frontendPort = window.location.port || '80';
    results[results.length - 1] = {
      icon: '✅',
      text: `Frontend running on port ${frontendPort}`,
      status: 'success'
    };

    setTestResults([...results]);

    // Final summary
    results.push({
      icon: '🎯',
      text: `Diagnostic complete! Backend port: ${backendPort}, Frontend port: ${frontendPort}`,
      status: 'info'
    });

    setTestResults([...results]);
    setTesting(false);
  };

  const addTestData = async () => {
    if (!backendStatus.port) {
      alert('Backend is not running!');
      return;
    }

    try {
      const response = await fetch(`http://localhost:${backendStatus.port}/api/add-test-data`, {
        method: 'POST'
      });
      const data = await response.json();
      alert(`Success! Added ${data.count} test subscriptions`);
      checkBackend();
      runFullDiagnostic();
    } catch (err) {
      alert(`Error: ${err.message}`);
    }
  };

  const getStatusBadge = (status) => {
    if (status.status === 'success') return <span className="status-badge status-success">✓ Running</span>;
    if (status.status === 'error') return <span className="status-badge status-error">✗ Offline</span>;
    if (status.status === 'warning') return <span className="status-badge status-warning">⚠ Warning</span>;
    return <span className="status-badge status-warning">? Checking</span>;
  };

  return (
    <div className="container">
      <div className="header">
        <h1>🔧 Subscription Manager Diagnostic</h1>
        <p>Real-time health monitoring and troubleshooting</p>
      </div>

      <div className="grid">
        <div className="card">
          <h2>🖥️ Backend API Status</h2>
          <div className="info-row">
            <span className="info-label">Status</span>
            {getStatusBadge(backendStatus)}
          </div>
          <div className="info-row">
            <span className="info-label">Port</span>
            <span className="info-value">{backendStatus.port || 'Not detected'}</span>
          </div>
          <div className="info-row">
            <span className="info-label">Message</span>
            <span className="info-value">{backendStatus.message}</span>
          </div>
          <button className="btn" onClick={checkBackend} disabled={testing}>
            🔄 Refresh Status
          </button>
        </div>

        <div className="card">
          <h2>💾 Database Status</h2>
          <div className="info-row">
            <span className="info-label">Status</span>
            {getStatusBadge(databaseStatus)}
          </div>
          <div className="info-row">
            <span className="info-label">Subscriptions</span>
            <span className="info-value">{databaseStatus.count}</span>
          </div>
          <div className="info-row">
            <span className="info-label">Message</span>
            <span className="info-value">{databaseStatus.message}</span>
          </div>
          <button className="btn btn-secondary" onClick={addTestData} disabled={!backendStatus.port}>
            ➕ Add Test Data
          </button>
        </div>

        <div className="card">
          <h2>🌐 Frontend Status</h2>
          <div className="info-row">
            <span className="info-label">Current Port</span>
            <span className="info-value">{window.location.port || '80'}</span>
          </div>
          <div className="info-row">
            <span className="info-label">API Target</span>
            <span className="info-value">Check app.js</span>
          </div>
          <div className="info-row">
            <span className="info-label">Protocol</span>
            <span className="info-value">{window.location.protocol}</span>
          </div>
          <button className="btn" onClick={runFullDiagnostic} disabled={testing}>
            {testing ? '⏳ Testing...' : '🧪 Run Full Diagnostic'}
          </button>
        </div>
      </div>

      {testResults.length > 0 && (
        <div className="card">
          <h2>📊 Test Results</h2>
          <div className="test-results">
            {testResults.map((result, i) => (
              <div key={i} className="test-line">
                <span className="test-icon">{result.icon}</span>
                <span style={{ color: result.status === 'error' ? '#ff4d4d' : result.status === 'success' ? '#5fe39a' : '#e0e0e0' }}>
                  {result.text}
                </span>
              </div>
            ))}
          </div>
        </div>
      )}

      <div className="fixes-section">
        <h2 style={{ color: '#ffe600', marginBottom: '20px', fontSize: '24px' }}>🔧 How to Fix</h2>

        <div className="fix-card">
          <h3><span className="fix-number">1</span> Port Configuration</h3>
          <div className="fix-description">
            Backend runs on port 8000 by default. Ensure frontend/app.js uses the correct API_BASE:
          </div>
          <div className="code-block">
            <pre>{`// In frontend/app.js line 2
const API_BASE = 'http://localhost:8001';  // Update to match your backend port`}</pre>
          </div>
        </div>

        <div className="fix-card">
          <h3><span className="fix-number">2</span> Start Backend & Frontend</h3>
          <div className="fix-description">
            Run both services (use separate terminals):
          </div>
          <div className="code-block">
            <pre>{`# Terminal 1: Backend
cd C:\\_dev\\subscription_manager
python -m uvicorn api:app --host 0.0.0.0 --port 8001

# Terminal 2: Frontend
cd frontend
python -m http.server 3000`}</pre>
          </div>
        </div>

        <div className="fix-card">
          <h3><span className="fix-number">3</span> Verify with Diagnostic</h3>
          <div className="fix-description">
            Click "Run Full Diagnostic" above to check:
          </div>
          <div className="code-block">
            <pre>{`✅ Backend health check
✅ Subscriptions endpoint
✅ Stats endpoint
✅ Frontend connectivity`}</pre>
          </div>
        </div>

        <div className="fix-card">
          <h3><span className="fix-number">4</span> Add Test Data</h3>
          <div className="fix-description">
            If database is empty, use the "Add Test Data" button above or call:
          </div>
          <div className="code-block">
            <pre>{`POST http://localhost:8001/api/add-test-data`}</pre>
          </div>
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<DiagnosticDashboard />);
</script>
</body>
</html>
