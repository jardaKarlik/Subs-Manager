# Railway.app deployment configuration for Subscription Manager

[build]
# Using Nixpacks for Python dependencies
builder = "nixpacks"

[deploy]
numReplicas = 1
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3

[environments.production]
variables = [
  "PYTHON_VERSION=3.14",
  "PORT=8000",
]

# Single backend service that serves both API and frontend
[[services]]
name = "subscription-manager"
startCommand = "python -m uvicorn api:app --host 0.0.0.0 --port $PORT"
ports = [{ port = 8000, type = "HTTP" }]
