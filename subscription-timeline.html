<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Subscription Timeline</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  background: #0a0a0b;
  color: #f5f5f3;
  padding: 20px;
  min-height: 100vh;
}

.container {
  max-width: 1200px;
  margin: 0 auto;
}

.header {
  text-align: center;
  margin-bottom: 40px;
  padding: 40px 20px;
  background: linear-gradient(135deg, rgba(255,230,0,0.1) 0%, rgba(255,107,26,0.05) 100%);
  border-radius: 16px;
  border: 1px solid rgba(255,230,0,0.2);
}

.header h1 {
  font-size: 48px;
  font-weight: 700;
  margin-bottom: 16px;
}

.header .spend {
  font-size: 64px;
  font-weight: 800;
  color: #ffe600;
  margin: 20px 0;
}

.header .subtitle {
  font-size: 18px;
  color: #8a8a8e;
}

.chart-container {
  background: rgba(255,255,255,0.03);
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: 12px;
  padding: 24px;
  margin-bottom: 24px;
}

.chart-container h2 {
  margin-bottom: 20px;
  font-size: 20px;
  color: #f5f5f3;
}

canvas {
  max-height: 400px;
}

.subscriptions-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
  gap: 16px;
  margin-top: 24px;
}

.sub-card {
  background: rgba(255,255,255,0.03);
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: 8px;
  padding: 16px;
  transition: all 0.2s;
}

.sub-card:hover {
  background: rgba(255,255,255,0.05);
  border-color: rgba(255,230,0,0.3);
  transform: translateY(-2px);
}

.sub-card .name {
  font-size: 16px;
  font-weight: 600;
  margin-bottom: 8px;
}

.sub-card .cost {
  font-size: 24px;
  font-weight: 700;
  color: #ffe600;
  margin-bottom: 4px;
}

.sub-card .category {
  font-size: 12px;
  color: #8a8a8e;
  text-transform: uppercase;
  letter-spacing: 0.5px;
}

.category-badge {
  display: inline-block;
  padding: 4px 8px;
  border-radius: 4px;
  font-size: 11px;
  font-weight: 600;
  margin-top: 8px;
}
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <h1>Subscription Tracker</h1>
    <div class="spend" id="totalSpend">$480</div>
    <div class="subtitle">per month on subscriptions</div>
  </div>

  <div class="chart-container">
    <h2>📊 Spending Over Time</h2>
    <canvas id="timelineChart"></canvas>
  </div>

  <div class="chart-container">
    <h2>📦 Your Subscriptions</h2>
    <div class="subscriptions-grid" id="subscriptionsGrid"></div>
  </div>
</div>

<script>
// Sample data - replace with API call later
const API_BASE = 'http://localhost:8000/api';
let subscriptions = [];

async function loadData() {
  try {
    const response = await fetch(`${API_BASE}/subscriptions?page_size=100`);
    if (response.ok) {
      const data = await response.json();
      subscriptions = data.items || [];
      console.log('✅ Loaded from backend:', subscriptions.length);
    } else {
      throw new Error('Backend not available');
    }
  } catch (error) {
    console.log('⚠️ Using sample data (backend offline)');
    // Fallback sample data
    subscriptions = [
      { service_name: 'Netflix', cost: 15.49, category: 'streaming', billing_cycle: 'monthly' },
      { service_name: 'Spotify', cost: 16.99, category: 'music', billing_cycle: 'monthly' },
      { service_name: 'AWS', cost: 142.30, category: 'cloud', billing_cycle: 'monthly' },
      { service_name: 'GitHub', cost: 4.00, category: 'dev_tools', billing_cycle: 'monthly' },
      { service_name: 'Claude', cost: 20.00, category: 'ai', billing_cycle: 'monthly' },
      { service_name: 'Vercel', cost: 20.00, category: 'cloud', billing_cycle: 'monthly' },
      { service_name: 'Adobe CC', cost: 52.99, category: 'design', billing_cycle: 'monthly' },
      { service_name: 'Linear', cost: 10.00, category: 'dev_tools', billing_cycle: 'monthly' },
      { service_name: 'Figma', cost: 15.00, category: 'dev_tools', billing_cycle: 'monthly' },
      { service_name: 'Notion', cost: 10.00, category: 'productivity', billing_cycle: 'monthly' },
    ];
  }
  
  renderAll();
}

function renderAll() {
  const total = subscriptions.reduce((sum, s) => sum + (s.cost || 0), 0);
  document.getElementById('totalSpend').textContent = `$${total.toFixed(0)}`;
  
  renderTimeline();
  renderSubscriptions();
}

function renderTimeline() {
  // Generate monthly data for last 12 months
  const months = [];
  const data = [];
  const now = new Date();
  
  for (let i = 11; i >= 0; i--) {
    const d = new Date(now.getFullYear(), now.getMonth() - i, 1);
    const monthName = d.toLocaleString('default', { month: 'short' });
    months.push(monthName);
    
    // Simulate growing subscriptions over time
    const multiplier = 0.5 + (i / 11) * 0.5; // 50% to 100%
    const monthlyTotal = subscriptions.reduce((sum, s) => sum + (s.cost || 0), 0) * multiplier;
    data.push(monthlyTotal);
  }

  const ctx = document.getElementById('timelineChart').getContext('2d');
  new Chart(ctx, {
    type: 'line',
    data: {
      labels: months,
      datasets: [{
        label: 'Monthly Spend',
        data: data,
        borderColor: '#ffe600',
        backgroundColor: 'rgba(255, 230, 0, 0.1)',
        borderWidth: 3,
        fill: true,
        tension: 0.4,
        pointBackgroundColor: '#ffe600',
        pointBorderColor: '#0a0a0b',
        pointBorderWidth: 2,
        pointRadius: 5,
        pointHoverRadius: 7,
      }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: true,
      plugins: {
        legend: {
          display: false
        },
        tooltip: {
          backgroundColor: '#16161a',
          titleColor: '#f5f5f3',
          bodyColor: '#ffe600',
          borderColor: 'rgba(255,230,0,0.3)',
          borderWidth: 1,
          padding: 12,
          displayColors: false,
          callbacks: {
            label: function(context) {
              return '$' + context.parsed.y.toFixed(2);
            }
          }
        }
      },
      scales: {
        y: {
          beginAtZero: true,
          grid: {
            color: 'rgba(255,255,255,0.05)',
            drawBorder: false
          },
          ticks: {
            color: '#8a8a8e',
            callback: function(value) {
              return '$' + value.toFixed(0);
            }
          }
        },
        x: {
          grid: {
            display: false,
            drawBorder: false
          },
          ticks: {
            color: '#8a8a8e'
          }
        }
      }
    }
  });
}

function renderSubscriptions() {
  const grid = document.getElementById('subscriptionsGrid');
  grid.innerHTML = '';
  
  const categoryColors = {
    streaming: '#ff6b1a',
    music: '#5fe39a',
    cloud: '#7aa9ff',
    dev_tools: '#a78bfa',
    ai: '#ffe600',
    design: '#ff5e99',
    productivity: '#8a8df0',
  };
  
  subscriptions.forEach(sub => {
    const card = document.createElement('div');
    card.className = 'sub-card';
    const color = categoryColors[sub.category] || '#8a8a8e';
    
    card.innerHTML = `
      <div class="name">${sub.service_name}</div>
      <div class="cost">$${sub.cost.toFixed(2)}</div>
      <div class="category">${sub.category || 'other'}</div>
      <div class="category-badge" style="background: ${color}20; color: ${color};">
        ${sub.billing_cycle || 'monthly'}
      </div>
    `;
    
    grid.appendChild(card);
  });
}

// Load on page load
loadData();
</script>
</body>
</html>
